name: Release

# Builds Windows + Linux installers and uploads them to a GitHub Release.
#
# Trigger it by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# or manually from the Actions tab (workflow_dispatch) giving a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

# tauri-action needs write access to publish the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on the oldest supported Ubuntu so the .deb/.AppImage run
          # on the widest range of systems (older glibc/webkit).
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl wget file patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "rsync-ui ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your OS from the assets below."
          # Draft so both platforms upload their installers to the SAME release;
          # review and click "Publish" once the run finishes. Set to false to
          # publish automatically.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
