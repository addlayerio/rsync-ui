name: Release

# Builds Windows + Linux installers and uploads them to a GitHub Release.
#
# Trigger it by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# or manually from the Actions tab (workflow_dispatch) giving a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

# tauri-action needs write access to publish the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on the oldest supported Ubuntu so the .deb/.AppImage run
          # on the widest range of systems (older glibc/webkit).
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl wget file patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "rsync-ui ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your OS from the assets below."
          # Auto-publish: both matrix jobs upload their installers to the same
          # release and it goes live automatically. Set to true if you'd rather
          # review a draft before publishing.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Hand the .deb to the Flatpak job below.
      - name: Upload .deb artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  # Package the Linux .deb into a Flatpak bundle and attach it to the release.
  # This is the recommended format for immutable distros (Fedora Silverblue/
  # Kinoite/Atomic, Bazzite, …) where you can't just `dnf install`.
  flatpak:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb
          path: flatpak

      - name: Install Flatpak tooling + GNOME runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak bundle
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          cd flatpak
          # The .deb filename follows productName (may contain a space), so
          # rename it via a quoted loop instead of an unquoted glob.
          for f in *_amd64.deb; do mv "$f" rsync-ui.deb; done
          flatpak-builder --user --disable-rofiles-fuse --force-clean \
            --repo=repo build-dir io.github.addlayerio.rsync_ui.yml
          flatpak build-bundle repo "../rsync-ui_${TAG}_x86_64.flatpak" \
            io.github.addlayerio.rsync_ui --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" "rsync-ui_${TAG}_x86_64.flatpak" --repo "$GITHUB_REPOSITORY" --clobber
